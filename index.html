<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verbindungsstatus</title>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body>
    <h1>MySQL Verbindungsstatus</h1>
    <p id="verbindungsstatus">Überprüfe Verbindungsstatus...</p>

    <script>
        // AJAX-Anfrage an das Server-Skript
        $.ajax({
            url: 'verbindungsstatus.php', // Passe den Pfad zum Server-Skript an
            method: 'GET',
            success: function(response) {
                // Update des Verbindungsstatus auf der Seite
                $('#verbindungsstatus').text('Status: ' + response);
            },
            error: function() {
                // Fehlermeldung, wenn die Anfrage fehlschlägt
                $('#verbindungsstatus').text('Fehler beim Abrufen des Verbindungsstatus.');
            }
        });
    </script>
</body>
</html>
